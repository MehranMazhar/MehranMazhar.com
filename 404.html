<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page not found · Mehran Mazhar</title>
<meta name="robots" content="noindex">
<link rel="icon" href="images/favicon.ico" type="image/x-icon">
<style>
  *{margin:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#fbfbf9;color:#1a1a1a;text-align:center;padding:24px;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.6}
  .code{font-family:ui-monospace,"SF Mono",Consolas,monospace;font-size:13px;letter-spacing:2px;
    text-transform:uppercase;color:#1f5c4d;margin-bottom:16px}
  h1{font-size:clamp(40px,10vw,72px);font-weight:700;letter-spacing:-.03em;line-height:1;margin-bottom:14px}
  p{color:#4a4a48;font-size:17px;max-width:38ch;margin:0 auto 28px}
  a{display:inline-flex;align-items:center;gap:8px;background:#1f5c4d;color:#fff;text-decoration:none;
    font-weight:600;padding:13px 22px;border-radius:10px;transition:background .18s}
  a:hover{background:#164137}
  a:focus-visible{outline:2px solid #1f5c4d;outline-offset:3px}
</style>
</head>
<body>
  <main>
    <p class="code">Error 404</p>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has moved.</p>
    <a href="/">← Back to home</a>
  </main>
</body>
</html>
